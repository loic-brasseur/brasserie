<html lang="fr">
<head>

<style>
  :root{
    --bg:#FBF5EC; --bg2:#F4ECDC; --card:#FFFDF7; --ink:#1A1612; --ink-soft:#7A6F5C;
    --amber:#B8842F; --copper:#A8541B; --gold:#CF982B; --green:#4F6B2F; --red:#A8392B;
    --line:rgba(26,22,18,.12); --line-strong:rgba(26,22,18,.24);
    --shadow:0 1px 2px rgba(26,22,18,.05),0 8px 24px rgba(26,22,18,.09);
    --serif:'Fraunces',Georgia,serif; --sans:'Manrope',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);line-height:1.45;
    background:radial-gradient(ellipse at top,#FBF5EC 0%,#F4ECDC 100%);background-attachment:fixed;
    -webkit-font-smoothing:antialiased;min-height:100vh;
    padding:max(1rem,env(safe-area-inset-top)) max(.9rem,env(safe-area-inset-right)) max(2.5rem,env(safe-area-inset-bottom)) max(.9rem,env(safe-area-inset-left));}
  .wrap{max-width:980px;margin:0 auto}
  header.app{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap;
    padding-bottom:1rem;margin-bottom:1.1rem;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:.85rem}
  .brand .mark{width:42px;height:42px;flex:0 0 auto;border-radius:11px;background:var(--ink);color:#FBF5EC;
    display:grid;place-items:center;font-family:var(--serif);font-size:1.4rem;font-weight:600}
  h1{font-family:var(--serif);font-weight:500;font-size:clamp(1.7rem,5vw,2.3rem);letter-spacing:-.02em;line-height:1;margin:0}
  .sub{font-family:var(--serif);font-style:italic;font-size:.92rem;color:var(--ink-soft);margin-top:.3rem}
  .toolbar{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
  button{font-family:var(--sans);cursor:pointer;border:none;border-radius:10px;font-size:.85rem;font-weight:600;
    padding:.6rem .9rem;transition:transform .12s,box-shadow .2s,background .2s}
  button:active{transform:translateY(1px)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line-strong)}
  .btn-ghost:hover{background:rgba(26,22,18,.05)}
  .btn-primary{background:var(--ink);color:#FBF5EC}
  .btn-primary:hover{box-shadow:0 6px 18px rgba(26,22,18,.25)}
  .btn-copper{background:var(--copper);color:#fff}
  .btn-copper:hover{box-shadow:0 6px 18px rgba(168,84,27,.32)}

  .summary{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:.7rem .95rem;box-shadow:var(--shadow);min-width:110px}
  .stat.alert{border-color:rgba(168,57,43,.4);background:linear-gradient(180deg,rgba(168,57,43,.06),var(--card))}
  .stat .n{font-family:var(--serif);font-size:1.55rem;line-height:1;font-weight:500}
  .stat.alert .n{color:var(--red)}
  .stat .l{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-top:.35rem}

  .controls{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
  .search{flex:1;min-width:160px}
  .input{font-family:var(--mono);font-size:.95rem;padding:.55rem .7rem;background:rgba(255,255,255,.7);
    border:1px solid #E0D4BE;border-radius:9px;color:var(--ink);width:100%;min-height:42px;-webkit-appearance:none;appearance:none}
  .input:focus{outline:none;border-color:var(--amber);background:#fff;box-shadow:0 0 0 3px rgba(184,132,47,.12)}
  select.input{font-family:var(--sans);font-weight:600}
  .chips{display:flex;gap:.4rem;flex-wrap:wrap}
  .chip{font-size:.78rem;font-weight:600;padding:.45rem .75rem;border-radius:999px;border:1.5px solid var(--line-strong);
    background:transparent;color:var(--ink-soft);cursor:pointer}
  .chip.active{background:var(--ink);color:#FBF5EC;border-color:var(--ink)}
  .chip .c{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:.4rem;vertical-align:middle}

  .catgroup{margin-bottom:1.4rem}
  .catgroup h2{font-family:var(--serif);font-weight:600;font-size:1.15rem;margin:0 0 .6rem;display:flex;align-items:center;gap:.5rem}
  .catgroup h2 .dot{width:10px;height:10px;border-radius:50%}
  .catgroup h2 .ct{font-family:var(--mono);font-size:.78rem;font-weight:500;color:var(--ink-soft)}

  .item{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);
    padding:.75rem .9rem;margin-bottom:.6rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
  .item.low{border-color:rgba(168,57,43,.45);background:linear-gradient(180deg,rgba(168,57,43,.05),var(--card))}
  .item .info{flex:1;min-width:140px}
  .item .nm{font-weight:700;font-size:1rem;display:flex;align-items:center;gap:.45rem;flex-wrap:wrap}
  .tag{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.2rem .45rem;border-radius:6px;
    background:rgba(168,57,43,.14);color:var(--red)}
  .item .det{font-size:.76rem;color:var(--ink-soft);margin-top:.2rem;font-family:var(--mono)}
  .qtybox{display:flex;align-items:center;gap:.4rem}
  .qtybox .q{font-family:var(--mono);font-weight:600;font-size:1.15rem;min-width:74px;text-align:right}
  .qtybox .q small{font-size:.62rem;color:var(--ink-soft);font-weight:500}
  .step{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line-strong);background:transparent;
    font-size:1.1rem;font-weight:700;color:var(--ink);display:grid;place-items:center;padding:0}
  .step:hover{background:rgba(26,22,18,.05)}
  .icbtn{background:transparent;border:none;color:var(--ink-soft);padding:.35rem;font-size:.95rem}
  .icbtn:hover{color:var(--ink)}
  .empty-cat{color:var(--ink-soft);font-style:italic;font-family:var(--serif);font-size:.88rem;padding:.3rem 0}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(26,22,18,.42);backdrop-filter:blur(3px);display:none;
    align-items:flex-start;justify-content:center;padding:1.2rem;z-index:50;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--card);border-radius:18px;box-shadow:0 20px 60px rgba(26,22,18,.3);width:100%;max-width:440px;margin:auto;
    border:1px solid var(--line);overflow:hidden;animation:pop .2s ease}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
  .modal h2{font-family:var(--serif);font-weight:500;font-size:1.35rem;margin:0;padding:1.1rem 1.2rem .2rem}
  .form{padding:1rem 1.2rem 1.2rem;display:flex;flex-direction:column;gap:.8rem}
  label{display:flex;flex-direction:column;gap:.3rem;font-size:.74rem;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);font-weight:600}
  .modal .input{font-size:1rem}
  .two{display:flex;gap:.6rem}.two>label{flex:1}
  .modal-actions{display:flex;gap:.5rem;padding:0 1.2rem 1.2rem}
  .modal-actions button{flex:1}
  .danger{color:var(--red);background:transparent;border:1.5px solid rgba(168,57,43,.4)}
  .danger:hover{background:rgba(168,57,43,.07)}
  footer{margin-top:2rem;text-align:center;color:var(--ink-soft);font-size:.74rem}
  .hidden{display:none!important}
  @media(max-width:560px){.summary{gap:.5rem}.stat{flex:1;min-width:0}.item .qtybox{margin-left:auto}}
  .modal.wide{max-width:600px}
  .recv-list{display:flex;flex-direction:column;gap:.45rem;max-height:48vh;overflow:auto;padding:0 1.2rem .6rem}
  .recv-cat{font-family:var(--serif);font-weight:600;font-size:.92rem;color:var(--ink-soft);margin:.5rem 0 .1rem;display:flex;align-items:center;gap:.4rem}
  .recv-cat .dot{width:8px;height:8px;border-radius:50%}
  .recv-row{display:flex;align-items:center;gap:.55rem;padding:.45rem .6rem;background:var(--bg);border:1px solid var(--line);border-radius:10px}
  .recv-row.filled{border-color:rgba(79,107,47,.5);background:linear-gradient(180deg,rgba(79,107,47,.07),var(--bg))}
  .recv-row.out{border-color:rgba(168,57,43,.5);background:linear-gradient(180deg,rgba(168,57,43,.06),var(--bg))}
  .recv-row .rn{flex:1;min-width:0}
  .recv-row .rn b{font-weight:600;font-size:.9rem;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .recv-row .rn small{font-size:.7rem;color:var(--ink-soft);font-family:var(--mono)}
  .recv-row input{width:86px;font-family:var(--mono);font-size:.95rem;padding:.4rem .5rem;border:1px solid #E0D4BE;border-radius:8px;background:#fff;text-align:right;min-height:38px;-webkit-appearance:none;appearance:none}
  .recv-row input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(184,132,47,.12)}
  .recv-row .u{font-size:.7rem;color:var(--ink-soft);width:28px}
  .recv-summary{font-size:.82rem;color:var(--ink-soft);padding:.2rem 1.2rem .5rem}
  .recv-summary b{color:var(--green)}
  .recv-row .lowtag{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    padding:.15rem .4rem;border-radius:5px;background:rgba(168,57,43,.14);color:var(--red);margin-left:.35rem}

  /* Bon de commande — impression */
  #orderPrint{display:none}
  @media print{
    body>*:not(#orderPrint){display:none!important}
    #orderPrint{display:block!important;font-family:var(--sans);color:#000}
    body{background:#fff;padding:0}
    #orderPrint h1{font-family:var(--serif);font-weight:600;font-size:1.5rem;margin:0 0 .2rem}
    #orderPrint .meta{font-size:.85rem;margin-bottom:1rem;color:#333}
    #orderPrint table{width:100%;border-collapse:collapse;font-size:.85rem}
    #orderPrint th,#orderPrint td{border:1px solid #999;padding:.4rem .55rem;text-align:left}
    #orderPrint th{background:#eee;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
    #orderPrint td.qn{text-align:right;font-family:var(--mono)}
    #orderPrint .foot{margin-top:1.2rem;font-size:.75rem;color:#555}
  }
</style>
</head>
<body>
<a href="index.html" id="backHome" aria-label="Retour à l'écran d'accueil" style="position:fixed;left:14px;bottom:14px;z-index:99999;display:inline-flex;align-items:center;gap:7px;background:#1A1612;color:#FBF5EC;font-family:'Manrope',system-ui,-apple-system,sans-serif;font-size:13px;font-weight:600;text-decoration:none;padding:10px 14px;border-radius:999px;box-shadow:0 4px 16px rgba(26,22,18,.28);-webkit-tap-highlight-color:transparent;"><span style="font-size:15px;line-height:1">←</span> Accueil</a>
<style id="backHomePrint">@media print{#backHome{display:none!important}}</style>

<div class="wrap">
  <header class="app">
    <div class="brand">
      <div class="mark">S</div>
      <div>
        <h1>Stock</h1>
        <div class="sub">Matières premières &amp; consommables</div>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn-primary" id="btnReceive">↓ Réception</button>
      <button class="btn-primary" id="btnUse">− Utilisation</button>
      <button class="btn-primary" id="btnOrder">↑ Commande</button>
      <button class="btn-copper" id="btnAdd">+ Article</button>
      <button class="btn-ghost" id="btnExport">Exporter</button>
      <button class="btn-ghost" id="btnImport">Importer</button>
      <input type="file" id="fileInput" accept="application/json" class="hidden">
    </div>
  </header>

  <div class="summary" id="summary"></div>

  <div class="controls">
    <div class="search"><input class="input" id="search" placeholder="Rechercher un article…"></div>
    <div class="chips" id="chips"></div>
  </div>

  <div id="list"></div>

  <footer>Données enregistrées sur cet appareil (localStorage). Pense à exporter pour sauvegarder.</footer>
</div>

<!-- Modal article -->
<div class="overlay" id="ov">
  <div class="modal">
    <h2 id="mTitle">Nouvel article</h2>
    <div class="form">
      <label>Nom
        <input class="input" id="f_name" placeholder="ex. Malt Pilsen">
      </label>
      <div class="two">
        <label>Catégorie
          <select class="input" id="f_cat"></select>
        </label>
        <label>Unité
          <input class="input" id="f_unit" placeholder="kg, g, sac, u…">
        </label>
      </div>
      <div class="two">
        <label>Quantité actuelle
          <input class="input" id="f_qty" type="number" step="any" inputmode="decimal">
        </label>
        <label>Seuil bas
          <input class="input" id="f_min" type="number" step="any" inputmode="decimal" placeholder="alerte si <">
        </label>
      </div>
      <label>Note / fournisseur / lot (optionnel)
        <input class="input" id="f_note" placeholder="ex. Castle Malting · lot 2026-A">
      </label>

    <div class="modal-actions">
      <button class="danger hidden" id="mDelete">Supprimer</button>

</div>

<!-- Modal réception / livraison -->
<div class="overlay" id="rov">
  <div class="modal wide">
    <h2>Réception de livraison</h2>
    <div class="form" style="padding-bottom:.4rem">
      <div class="two">
        <label>Date<input class="input" id="rcv_date" type="date"></label>
        <label>Fournisseur (optionnel)<input class="input" id="rcv_supplier" placeholder="ex. Castle Malting"></label>
      </div>
      <label>Filtrer<input class="input" id="rcv_search" placeholder="Rechercher un article…"></label>
    </div>
    <div class="recv-summary" id="rcv_summary"></div>
    <div class="recv-list" id="rcv_list"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="rcv_cancel">Annuler</button>
      <button class="btn-copper" id="rcv_save">Valider la réception</button>

</div>

<!-- Modal utilisation / sortie de stock -->
<div class="overlay" id="uov">
  <div class="modal wide">
    <h2>Sortie de stock</h2>
    <div class="form" style="padding-bottom:.4rem">
      <div class="two">
        <label>Date<input class="input" id="use_date" type="date"></label>
        <label>Motif (optionnel)<input class="input" id="use_reason" placeholder="ex. Brassin Valmy blanche"></label>
      </div>
      <label>Filtrer<input class="input" id="use_search" placeholder="Rechercher un article…"></label>
    </div>
    <div class="recv-summary" id="use_summary"></div>
    <div class="recv-list" id="use_list"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="use_cancel">Annuler</button>
      <button class="btn-copper" id="use_save">Valider la sortie</button>

</div>

<!-- Modal bon de commande -->
<div class="overlay" id="cov">
  <div class="modal wide">
    <h2>Bon de commande</h2>
    <div class="form" style="padding-bottom:.4rem">
      <div class="two">
        <label>Date<input class="input" id="ord_date" type="date"></label>
        <label>Fournisseur (optionnel)<input class="input" id="ord_supplier" placeholder="ex. Brewpark"></label>
      </div>
      <label>Filtrer<input class="input" id="ord_search" placeholder="Rechercher un article…"></label>
    </div>
    <div class="recv-summary" id="ord_summary"></div>
    <div class="recv-list" id="ord_list"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="ord_cancel">Annuler</button>
      <button class="btn-copper" id="ord_print">Imprimer / PDF</button>
    </div>

<div id="orderPrint"></div>

<script>
const STORE='brasserie_stock_v2';
const CATS=[
  {id:'malt',label:'Malts / céréales',color:'#CF982B'},
  {id:'houblon',label:'Houblons',color:'#4F6B2F'},
  {id:'levure',label:'Levures',color:'#A8541B'},
  {id:'conso',label:'Consommables / additifs',color:'#7A6F5C'}
];
const SEED_MALTS=['Malt pilsen','Malt pilsen bio Ferme','Malt pilsen bio','Malt pale ale','Malt pale ale bio','Malt Munich 15 bio','Malt Acide','Malt Cara Hell','Malt MROOST 1400','Flocon de blé'];
const SEED_HOPS=['CASCADE CONV','HALLERTAU BLANC CONV','TRADITION CONV','NORTHERN BREWER CONV','CITRA CONV','ELEXIR CONV','MISTRAL CONV','BREWERS GOLD CONV','SAAZ CONV','STRISSELSPALT CONV','MAGNUM CONV','ARIANA CONV','PERLE CONV','HALLERTAU BLANC BIO','GOLDING BIO','WGV BIO','PILGRIM BIO','ARIANA BIO','ARAMIS BIO','CHINOOK BIO','PHOENIX BIO','SPALT SELECT BIO','STRISSELSPALT BIO','CASCADE BIO','CHALLENGER BIO','ELIXIR BIO'];
const SEED_YEASTS=['Levure CBC-1','Levure WIT','levure NOVALAGER','Levure LALLEMAND ABBAYE','Levure LALLEMAND BRY-97'];
const SEED_CONSO=[['Sucre bio','kg'],['ECORCE DE CITRON BIO','kg'],['FEVE DE TONKA BIO','kg'],['CANELLE BIO','kg'],['coriandre','kg'],['écorces orange','kg'],['gingembre','kg'],['cardamone','kg'],['genièvre','kg'],['curcuma','kg'],['Jus concentré framboise bio','L'],['Jus pomme','L'],['arôme marc champagne','L'],['arôme naturel framboise','L'],['arôme pomme','L'],['arôme citron','L'],['stévia','kg'],['marc de champagne','L'],['SORBATE DE POTASSIUM','kg'],['ANTIOX SB','kg']];
const SEED=[
  ...SEED_MALTS.map(n=>({id:uid(),cat:'malt',name:n,unit:'kg',qty:0,min:'',note:''})),
  ...SEED_HOPS.map(n=>({id:uid(),cat:'houblon',name:n,unit:'kg',qty:0,min:'',note:''})),
  ...SEED_YEASTS.map(n=>({id:uid(),cat:'levure',name:n,unit:'kg',qty:0,min:'',note:''})),
  ...SEED_CONSO.map(x=>({id:uid(),cat:'conso',name:x[0],unit:x[1],qty:0,min:'',note:''}))
];
function uid(){return 'a'+Math.random().toString(36).slice(2,9);}
let state=load();
let filter='all', search='', editId=null;

function load(){
  try{const s=JSON.parse(localStorage.getItem(STORE));if(s&&s.items)return s;}catch(e){}
  return {items:SEED};
}
function save(){localStorage.setItem(STORE,JSON.stringify(state));}
function cat(id){return CATS.find(c=>c.id===id);}
const num=n=>{const v=Number(n);return Number.isInteger(v)?v.toLocaleString('fr-FR'):v.toLocaleString('fr-FR',{maximumFractionDigits:2});};
const isLow=it=>it.min!=null&&it.min!==''&&Number(it.qty)<=Number(it.min);

function render(){
  const items=state.items;
  const lowN=items.filter(isLow).length;
  document.getElementById('summary').innerHTML=`
    <div class="stat"><div class="n">${items.length}</div><div class="l">Articles suivis</div></div>
    <div class="stat ${lowN?'alert':''}"><div class="n">${lowN}</div><div class="l">Sous le seuil</div></div>
    ${CATS.map(c=>{const n=items.filter(i=>i.cat===c.id).length;return `<div class="stat"><div class="n">${n}</div><div class="l">${c.label.split(' ')[0]}</div></div>`;}).join('')}`;

  // chips
  document.getElementById('chips').innerHTML=
    `<button class="chip ${filter==='all'?'active':''}" data-f="all">Tout</button>`+
    `<button class="chip ${filter==='low'?'active':''}" data-f="low"><span class="c" style="background:var(--red)"></span>Stock bas</button>`+
    CATS.map(c=>`<button class="chip ${filter===c.id?'active':''}" data-f="${c.id}"><span class="c" style="background:${c.color}"></span>${c.label.split(' / ')[0]}</button>`).join('');

  const q=search.trim().toLowerCase();
  let shown=items.filter(i=>!q||i.name.toLowerCase().includes(q)||(i.note||'').toLowerCase().includes(q));
  if(filter==='low')shown=shown.filter(isLow);
  else if(filter!=='all')shown=shown.filter(i=>i.cat===filter);

  const list=document.getElementById('list');
  const groups=filter==='all'||filter==='low'?CATS:CATS.filter(c=>c.id===filter);
  list.innerHTML=groups.map(c=>{
    const its=shown.filter(i=>i.cat===c.id).sort((a,b)=>{
      if(isLow(a)!==isLow(b))return isLow(a)?-1:1;return a.name.localeCompare(b.name);
    });
    if(!its.length&&(filter==='low'||q))return '';
    return `<div class="catgroup">
      <h2><span class="dot" style="background:${c.color}"></span>${c.label} <span class="ct">${its.length}</span></h2>
      ${its.length?its.map(it=>itemRow(it)).join(''):'<div class="empty-cat">Aucun article.</div>'}
    </div>`;
  }).join('')||`<div class="empty-cat">Aucun résultat.</div>`;
}

function itemRow(it){
  const low=isLow(it);
  return `<div class="item ${low?'low':''}">
    <div class="info">
      <div class="nm">${it.name}${low?'<span class="tag">Stock bas</span>':''}</div>
      <div class="det">${it.min!=null&&it.min!==''?`seuil ${num(it.min)} ${it.unit||''}`:'pas de seuil'}${it.note?' · '+it.note:''}</div>
    </div>
    <div class="qtybox">
      <button class="step" data-act="minus" data-id="${it.id}">−</button>
      <div class="q">${num(it.qty)} <small>${it.unit||''}</small></div>
      <button class="step" data-act="plus" data-id="${it.id}">+</button>
      <button class="icbtn" data-act="edit" data-id="${it.id}" title="Modifier">✎</button>
    </div>
  </div>`;
}

// ---- modal ----
const ov=document.getElementById('ov');
function openModal(id){
  editId=id;const it=id?state.items.find(i=>i.id===id):null;
  document.getElementById('mTitle').textContent=it?'Modifier l\'article':'Nouvel article';
  document.getElementById('f_cat').innerHTML=CATS.map(c=>`<option value="${c.id}">${c.label}</option>`).join('');
  document.getElementById('f_name').value=it?.name||'';
  document.getElementById('f_cat').value=it?.cat||(filter!=='all'&&filter!=='low'?filter:'malt');
  document.getElementById('f_unit').value=it?.unit||'';
  document.getElementById('f_qty').value=it?.qty??'';
  document.getElementById('f_min').value=it?.min??'';
  document.getElementById('f_note').value=it?.note||'';
  document.getElementById('mDelete').classList.toggle('hidden',!it);
  ov.classList.add('show');
  setTimeout(()=>document.getElementById('f_name').focus(),50);
}
function closeModal(){ov.classList.remove('show');editId=null;}
document.getElementById('mCancel').onclick=closeModal;
ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
document.getElementById('mSave').onclick=()=>{
  const name=document.getElementById('f_name').value.trim();
  if(!name){document.getElementById('f_name').focus();return;}
  const data={
    cat:document.getElementById('f_cat').value,
    name,
    unit:document.getElementById('f_unit').value.trim(),
    qty:parseFloat(document.getElementById('f_qty').value)||0,
    min:document.getElementById('f_min').value!==''?parseFloat(document.getElementById('f_min').value):'',
    note:document.getElementById('f_note').value.trim()
  };
  if(editId){Object.assign(state.items.find(i=>i.id===editId),data);}
  else{state.items.push({id:uid(),...data});}
  save();render();closeModal();
};
document.getElementById('mDelete').onclick=()=>{
  if(confirm('Supprimer cet article ?')){state.items=state.items.filter(i=>i.id!==editId);save();render();closeModal();}
};
document.getElementById('btnAdd').onclick=()=>openModal(null);

// ---- list actions ----
document.getElementById('list').addEventListener('click',e=>{
  const btn=e.target.closest('button[data-act]');if(!btn)return;
  const it=state.items.find(i=>i.id===btn.dataset.id);if(!it)return;
  const act=btn.dataset.act;
  if(act==='edit')return openModal(it.id);
  // smart step: 1 for small stocks, else 10
  const base=Math.abs(Number(it.qty))>=200?10:1;
  if(act==='plus')it.qty=Number(it.qty)+base;
  if(act==='minus')it.qty=Math.max(0,Number(it.qty)-base);
  save();render();
});

// ---- chips & search ----
document.getElementById('chips').addEventListener('click',e=>{
  const b=e.target.closest('button[data-f]');if(!b)return;filter=b.dataset.f;render();
});
document.getElementById('search').addEventListener('input',e=>{search=e.target.value;render();});

// ---- import / export ----
document.getElementById('btnExport').onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='stock_'+new Date().toISOString().slice(0,10)+'.json';a.click();
};
document.getElementById('btnImport').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange=e=>{
  const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const s=JSON.parse(rd.result);if(s.items){state=s;save();render();}}catch(err){alert('Fichier invalide');}};
  rd.readAsText(f);
};

/* ---- Réception / bon de livraison ---- */
const rov=document.getElementById('rov');
let recv={};
function openReceive(){
  recv={};
  document.getElementById('rcv_date').value=new Date().toISOString().slice(0,10);
  document.getElementById('rcv_supplier').value='';
  document.getElementById('rcv_search').value='';
  renderReceive('');
  rov.classList.add('show');
}
function closeReceive(){rov.classList.remove('show');}
function renderReceive(q){
  q=(q||'').trim().toLowerCase();
  let html='';
  CATS.forEach(c=>{
    const its=state.items.filter(i=>i.cat===c.id&&(!q||i.name.toLowerCase().includes(q))).sort((a,b)=>a.name.localeCompare(b.name));
    if(!its.length)return;
    html+=`<div class="recv-cat"><span class="dot" style="background:${c.color}"></span>${c.label}</div>`;
    its.forEach(it=>{
      const v=recv[it.id]!=null?recv[it.id]:'';
      const filled=v!==''&&parseFloat(v)>0;
      html+=`<div class="recv-row ${filled?'filled':''}">
        <div class="rn"><b>${it.name}</b><small>en stock : ${num(it.qty)} ${it.unit||''}</small></div>
        <input type="number" step="any" inputmode="decimal" data-id="${it.id}" value="${v}" placeholder="+ reçu">
        <span class="u">${it.unit||''}</span></div>`;
    });
  });
  document.getElementById('rcv_list').innerHTML=html||'<div class="empty-cat" style="padding:1rem 1.2rem">Aucun article.</div>';
  updateRecvSummary();
}
function updateRecvSummary(){
  const n=Object.values(recv).filter(v=>v!==''&&parseFloat(v)>0).length;
  document.getElementById('rcv_summary').innerHTML=n?`<b>${n}</b> article(s) à ajouter au stock`:'Saisis les quantités reçues ci-dessous.';
}
document.getElementById('rcv_list').addEventListener('input',e=>{
  const inp=e.target.closest('input[data-id]');if(!inp)return;
  recv[inp.dataset.id]=inp.value;
  const row=inp.closest('.recv-row');
  if(row)row.classList.toggle('filled',inp.value!==''&&parseFloat(inp.value)>0);
  updateRecvSummary();
});
document.getElementById('rcv_search').addEventListener('input',e=>renderReceive(e.target.value));
document.getElementById('rcv_cancel').onclick=closeReceive;
rov.addEventListener('click',e=>{if(e.target===rov)closeReceive();});
document.getElementById('rcv_save').onclick=()=>{
  let count=0;
  Object.keys(recv).forEach(id=>{
    const v=parseFloat(recv[id]);
    if(!isNaN(v)&&v>0){const it=state.items.find(x=>x.id===id);if(it){it.qty=Number(it.qty)+v;count++;}}
  });
  if(count>0){save();render();}
  closeReceive();
};
document.getElementById('btnReceive').onclick=openReceive;

/* ---- Utilisation / sortie de stock ---- */
const uov=document.getElementById('uov');
let usage={};
function openUse(){
  usage={};
  document.getElementById('use_date').value=new Date().toISOString().slice(0,10);
  document.getElementById('use_reason').value='';
  document.getElementById('use_search').value='';
  renderUse('');
  uov.classList.add('show');
}
function closeUse(){uov.classList.remove('show');}
function renderUse(q){
  q=(q||'').trim().toLowerCase();
  let html='';
  CATS.forEach(c=>{
    const its=state.items.filter(i=>i.cat===c.id&&Number(i.qty)>0&&(!q||i.name.toLowerCase().includes(q)))
      .sort((a,b)=>a.name.localeCompare(b.name));
    if(!its.length)return;
    html+=`<div class="recv-cat"><span class="dot" style="background:${c.color}"></span>${c.label}</div>`;
    its.forEach(it=>{
      const v=usage[it.id]!=null?usage[it.id]:'';
      const filled=v!==''&&parseFloat(v)>0;
      html+=`<div class="recv-row ${filled?'out':''}">
        <div class="rn"><b>${it.name}</b><small>en stock : ${num(it.qty)} ${it.unit||''}</small></div>
        <input type="number" step="any" inputmode="decimal" data-id="${it.id}" value="${v}" placeholder="− utilisé">
        <span class="u">${it.unit||''}</span></div>`;
    });
  });
  document.getElementById('use_list').innerHTML=html||'<div class="empty-cat" style="padding:1rem 1.2rem">Aucun article en stock.</div>';
  updateUseSummary();
}
function updateUseSummary(){
  const n=Object.values(usage).filter(v=>v!==''&&parseFloat(v)>0).length;
  document.getElementById('use_summary').innerHTML=n?`<b style="color:var(--red)">${n}</b> article(s) à déduire du stock`:'Saisis les quantités utilisées ci-dessous.';
}
document.getElementById('use_list').addEventListener('input',e=>{
  const inp=e.target.closest('input[data-id]');if(!inp)return;
  usage[inp.dataset.id]=inp.value;
  const row=inp.closest('.recv-row');
  if(row)row.classList.toggle('out',inp.value!==''&&parseFloat(inp.value)>0);
  updateUseSummary();
});
document.getElementById('use_search').addEventListener('input',e=>renderUse(e.target.value));
document.getElementById('use_cancel').onclick=closeUse;
uov.addEventListener('click',e=>{if(e.target===uov)closeUse();});
document.getElementById('use_save').onclick=()=>{
  let count=0;
  Object.keys(usage).forEach(id=>{
    const v=parseFloat(usage[id]);
    if(!isNaN(v)&&v>0){const it=state.items.find(x=>x.id===id);if(it){it.qty=Math.max(0,Number(it.qty)-v);count++;}}
  });
  if(count>0){save();render();}
  closeUse();
};
document.getElementById('btnUse').onclick=openUse;

/* ---- Bon de commande ---- */
const cov=document.getElementById('cov');
let order={};
function openOrder(){
  order={};
  // pré-remplissage : articles sous le seuil → quantité suggérée pour revenir à 2× le seuil
  state.items.forEach(it=>{
    if(isLow(it)){
      const min=Number(it.min)||0,q=Number(it.qty)||0;
      const sugg=Math.ceil(Math.max(min*2-q,1));
      order[it.id]=String(sugg);
    }
  });
  document.getElementById('ord_date').value=new Date().toISOString().slice(0,10);
  document.getElementById('ord_supplier').value='';
  document.getElementById('ord_search').value='';
  renderOrder('');
  cov.classList.add('show');
}
function closeOrder(){cov.classList.remove('show');}
function renderOrder(q){
  q=(q||'').trim().toLowerCase();
  let html='';
  CATS.forEach(c=>{
    const its=state.items.filter(i=>i.cat===c.id&&(!q||i.name.toLowerCase().includes(q)))
      .sort((a,b)=>{if(isLow(a)!==isLow(b))return isLow(a)?-1:1;return a.name.localeCompare(b.name);});
    if(!its.length)return;
    html+=`<div class="recv-cat"><span class="dot" style="background:${c.color}"></span>${c.label}</div>`;
    its.forEach(it=>{
      const v=order[it.id]!=null?order[it.id]:'';
      const filled=v!==''&&parseFloat(v)>0;
      html+=`<div class="recv-row ${filled?'filled':''}">
        <div class="rn"><b>${it.name}${isLow(it)?'<span class="lowtag">Stock bas</span>':''}</b><small>en stock : ${num(it.qty)} ${it.unit||''}${it.min!==''&&it.min!=null?' · seuil '+num(it.min):''}</small></div>
        <input type="number" step="any" inputmode="decimal" data-id="${it.id}" value="${v}" placeholder="à cmd.">
        <span class="u">${it.unit||''}</span></div>`;
    });
  });
  document.getElementById('ord_list').innerHTML=html||'<div class="empty-cat" style="padding:1rem 1.2rem">Aucun article.</div>';
  updateOrderSummary();
}
function updateOrderSummary(){
  const n=Object.values(order).filter(v=>v!==''&&parseFloat(v)>0).length;
  document.getElementById('ord_summary').innerHTML=n?`<b>${n}</b> article(s) sur le bon de commande`:'Saisis les quantités à commander (stock bas pré-rempli).';
}
document.getElementById('ord_list').addEventListener('input',e=>{
  const inp=e.target.closest('input[data-id]');if(!inp)return;
  order[inp.dataset.id]=inp.value;
  const row=inp.closest('.recv-row');
  if(row)row.classList.toggle('filled',inp.value!==''&&parseFloat(inp.value)>0);
  updateOrderSummary();
});
document.getElementById('ord_search').addEventListener('input',e=>renderOrder(e.target.value));
document.getElementById('ord_cancel').onclick=closeOrder;
cov.addEventListener('click',e=>{if(e.target===cov)closeOrder();});
document.getElementById('ord_print').onclick=()=>{
  const lines=[];
  CATS.forEach(c=>{
    state.items.filter(i=>i.cat===c.id).sort((a,b)=>a.name.localeCompare(b.name)).forEach(it=>{
      const v=parseFloat(order[it.id]);
      if(!isNaN(v)&&v>0)lines.push({cat:c.label,name:it.name,unit:it.unit||'',qty:v,stock:it.qty,note:it.note||''});
    });
  });
  if(!lines.length){alert('Aucune quantité saisie.');return;}
  const d=document.getElementById('ord_date').value;
  const dateFr=d?new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}):'';
  const sup=document.getElementById('ord_supplier').value.trim();
  document.getElementById('orderPrint').innerHTML=`
    <h1>Bon de commande</h1>
    <div class="meta">${dateFr}${sup?' — Fournisseur : <b>'+sup+'</b>':''}</div>
    <table><thead><tr><th>Catégorie</th><th>Article</th><th>En stock</th><th>Quantité commandée</th><th>Note</th></tr></thead>
    <tbody>${lines.map(l=>`<tr><td>${l.cat}</td><td>${l.name}</td><td class="qn">${num(l.stock)} ${l.unit}</td><td class="qn"><b>${num(l.qty)} ${l.unit}</b></td><td>${l.note}</td></tr>`).join('')}</tbody></table>
    <div class="foot">${lines.length} article(s) — généré le ${new Date().toLocaleDateString('fr-FR')}</div>`;
  window.print();
};
document.getElementById('btnOrder').onclick=openOrder;

render();
</script>
</body>
</html>
